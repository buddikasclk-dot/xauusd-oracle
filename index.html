<script>
const { useState, useEffect, useRef, useCallback } = React;
const h = React.createElement;

const STORAGE_KEY = "xauusd_oracle_live_v4_local_only";
const BASE_CANDLE_MS = 60000;
const HISTORY_LIMIT = 3000;
const TF_CONFIG = {
  M1: { label: "M1", minutes: 1, group: 1 },
  M5: { label: "M5", minutes: 5, group: 5 },
  M15: { label: "M15", minutes: 15, group: 15 },
  M30: { label: "M30", minutes: 30, group: 30 },
  H1: { label: "H1", minutes: 60, group: 60 },
  H4: { label: "H4", minutes: 240, group: 240 },
  D1: { label: "D1", minutes: 1440, group: 1440 }
};

function safeReadStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const parsed = raw ? JSON.parse(raw) : {};
    return {
      ...parsed,
      forecastBrain: "local",
      forecastModel: "local",
      forecastApiKey: ""
    };
  } catch (err) {
    return {
      forecastBrain: "local",
      forecastModel: "local",
      forecastApiKey: ""
    };
  }
}

function formatPrice(value) {
  return Number(value || 0).toLocaleString("en-US", {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });
}

function formatAxisTime(timestamp, tf) {
  const date = new Date(timestamp);
  const options = { timeZone: "Asia/Colombo", hour12: false };
  if (tf === "D1") {
    return date.toLocaleDateString("en-GB", { ...options, month: "short", day: "numeric" });
  }
  if (tf === "H4" || tf === "H1") {
    return date.toLocaleTimeString("en-GB", { ...options, hour: "2-digit", minute: "2-digit" });
  }
  return date.toLocaleTimeString("en-GB", { ...options, hour: "2-digit", minute: "2-digit" });
}

function formatSriLankaDateTime(timestamp) {
  if (!timestamp) return "--";
  return new Date(timestamp).toLocaleString("en-GB", {
    timeZone: "Asia/Colombo",
    hour12: false,
    year: "numeric",
    month: "short",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });
}

function getStaleThresholdMs(tf) {
  const candleMs = (TF_CONFIG[tf]?.minutes || 1) * 60000;
  return Math.max(candleMs * 2, 2 * 60 * 1000);
}

function getSriLankaParts(date = new Date()) {
  const parts = new Intl.DateTimeFormat("en-GB", {
    timeZone: "Asia/Colombo",
    weekday: "short",
    hour: "2-digit",
    minute: "2-digit",
    hour12: false
  }).formatToParts(date);
  const map = Object.fromEntries(parts.filter(p => p.type !== "literal").map(p => [p.type, p.value]));
  return { weekday: map.weekday, hour: Number(map.hour || 0), minute: Number(map.minute || 0) };
}

function getMarketSessionStatus(now = new Date()) {
  const { weekday, hour, minute } = getSriLankaParts(now);
  const minutes = hour * 60 + minute;
  const isDailyPause = minutes >= 150 && minutes < 210;
  const isWeekendStart = weekday === "Fri" && minutes >= 1320;
  const isWeekendClosed = weekday === "Sat" || weekday === "Sun";
  const isMondayEarly = weekday === "Mon" && minutes < 210;
  const isClosed = isWeekendStart || isWeekendClosed || isMondayEarly || (["Tue", "Wed", "Thu", "Fri"].includes(weekday) && isDailyPause);
  let caption = "Market open";
  if (isWeekendStart || isWeekendClosed || isMondayEarly) caption = "Market closed until Monday 03:30 AM SLT";
  else if (isClosed) caption = "Market closed until 03:30 AM SLT";
  return { isClosed, caption };
}

function extractJsonBlock(text) {
  if (!text) return null;
  const fenced = text.match(/```json\s*([\s\S]*?)```/i) || text.match(/```\s*([\s\S]*?)```/i);
  const candidate = fenced ? fenced[1] : text;
  const start = candidate.indexOf("{");
  const end = candidate.lastIndexOf("}");
  if (start === -1 || end === -1 || end <= start) return null;
  return candidate.slice(start, end + 1);
}

function normalizePredictionPayload(payload, fallbackPrice, session) {
  if (!payload || typeof payload !== "object") return null;
  const entry = Number(payload.entry ?? fallbackPrice);
  const stop = Number(payload.stop ?? entry);
  const tp1 = Number(payload.tp1 ?? entry);
  const tp2 = Number(payload.tp2 ?? tp1);
  const tp3 = Number(payload.tp3 ?? tp2);
  const forecast5 = Number(payload.forecast5 ?? tp1);
  const forecast10 = Number(payload.forecast10 ?? tp2);
  const confidence = Math.max(0, Math.min(100, Number(payload.confidence ?? 0)));
  const signal = ["BUY", "SELL", "WAIT"].includes(payload.signal) ? payload.signal : "WAIT";
  const reasons = Array.isArray(payload.reasons) ? payload.reasons.map(String).slice(0, 6) : [];
  const risks = Array.isArray(payload.risks) ? payload.risks.map(String).slice(0, 3) : [];
  const tradeQuality = payload.trade_quality || "C";
  const rrRatio = Number(payload.rr_ratio ?? 0);
  const marketBias = payload.market_bias || "Neutral";
  const newsRisk = payload.news_risk || "Low";
  const path = signal === "WAIT" || session.isClosed ? [] : Array.from({ length: 5 }, (_, i) => {
    const ratio = (i + 1) / 5;
    const p = entry + (forecast5 - entry) * ratio;
    return { time: Date.now() + (i + 1) * 60000, price: p };
  });
  return {
    generatedAt: Date.now(),
    horizon: payload.horizon || "5m",
    signal,
    confidence,
    entry,
    stop,
    tp1,
    tp2,
    tp3,
    forecast5,
    forecast10,
    reasons,
    risks,
    tradeQuality,
    rrRatio,
    marketBias,
    newsRisk,
    path
  };
}

function calcAccountPlan(price, levels, balance, lotSize, leverage) {
  const safeBalance = Math.max(Number(balance) || 0, 0);
  const safeLot = Math.max(Number(lotSize) || 0, 0);
  const safeLeverage = Math.max(Number(leverage) || 0, 1);
  const ozPerLot = 100;
  const minBrokerLot = 0.01;
  const notional = price * ozPerLot * safeLot;
  const marginRequired = safeLot > 0 ? notional / safeLeverage : 0;
  const stopDistance = Math.abs(price - levels.stop);
  const tp1Distance = Math.abs(levels.tp1 - price);
  const tp2Distance = Math.abs(levels.tp2 - price);
  const riskDollar = stopDistance * ozPerLot * safeLot;
  const tp1Dollar = tp1Distance * ozPerLot * safeLot;
  const tp2Dollar = tp2Distance * ozPerLot * safeLot;
  const minLotRiskDollar = stopDistance * ozPerLot * minBrokerLot;
  const minLotTp1Dollar = tp1Distance * ozPerLot * minBrokerLot;
  const minLotTp2Dollar = tp2Distance * ozPerLot * minBrokerLot;
  const riskPct = safeBalance > 0 ? (riskDollar / safeBalance) * 100 : 0;
  const marginPct = safeBalance > 0 ? (marginRequired / safeBalance) * 100 : 0;
  const recommendedRiskPct = 1;
  const hardRiskPct = 2;
  const recommendedMaxLoss = safeBalance * (recommendedRiskPct / 100);
  const hardMaxLoss = safeBalance * (hardRiskPct / 100);
  const suggestedLot = stopDistance > 0 ? recommendedMaxLoss / (stopDistance * ozPerLot) : 0;
  const maxSafeLot = stopDistance > 0 ? hardMaxLoss / (stopDistance * ozPerLot) : 0;
  const optimalRiskDollar = safeBalance * 0.01;
  const optimalLot = stopDistance > 0
    ? Math.max(0.01, parseFloat((safeBalance * 0.01 / (stopDistance * ozPerLot)).toFixed(2)))
    : 0;
  const finalSuggestedLot = Math.max(0.01, Math.min(optimalLot, maxSafeLot || 0.01));
  const requiredBalance1Pct = minLotRiskDollar > 0 ? minLotRiskDollar / 0.01 : 0;
  const requiredBalance2Pct = minLotRiskDollar > 0 ? minLotRiskDollar / 0.02 : 0;
  const requiredBalance3Pct = minLotRiskDollar > 0 ? minLotRiskDollar / 0.03 : 0;
  const minLotRiskPct = safeBalance > 0 ? (minLotRiskDollar / safeBalance) * 100 : 0;
  const walletStatus = safeBalance <= 0
    ? "ENTER_BALANCE"
    : minLotRiskPct <= 1
      ? "COMFORTABLE"
      : minLotRiskPct <= 3
        ? "HIGH_BUT_VALID"
        : "TOO_SMALL";
  const warnings = [];
  if (safeBalance <= 0) warnings.push("Enter account balance to validate position risk.");
  if (safeLot <= 0) warnings.push("Enter lot size to calculate account exposure.");
  if (riskPct > hardRiskPct) warnings.push("Stop loss risks more than 2% of balance.");
  else if (riskPct > recommendedRiskPct) warnings.push("Stop loss risks more than the preferred 1% balance rule.");
  if (safeBalance > 0 && minLotRiskPct > 3) warnings.push("Even the broker minimum 0.01 lot is too large for this setup on your wallet.");
  if (marginPct > 50) warnings.push("Estimated margin usage is above 50% of account balance.");
  else if (marginPct > 25) warnings.push("Estimated margin usage is elevated.");
  const tradable = warnings.length === 0 || warnings.every(w => !/more than 2%|above 50%/.test(w));
  return {
    ozPerLot,
    minBrokerLot,
    notional,
    marginRequired,
    marginPct,
    riskDollar,
    riskPct,
    tp1Dollar,
    tp2Dollar,
    minLotRiskDollar,
    minLotTp1Dollar,
    minLotTp2Dollar,
    minLotRiskPct,
    suggestedLot,
    maxSafeLot,
    optimalLot,
    finalSuggestedLot,
    requiredBalance1Pct,
    requiredBalance2Pct,
    requiredBalance3Pct,
    walletStatus,
    warnings,
    tradable
  };
}

function applyRiskGateToSignal(signal, accountPlan) {
  if (accountPlan.riskPct > 3) return "WAIT";
  if (accountPlan.marginPct > 60) return "WAIT";
  if (accountPlan.walletStatus === "TOO_SMALL") return "WAIT";
  return signal;
}

async function requestForecastViaProxy(provider, apiKey, model, prompt, systemPrompt) {
  const response = await fetch("http://127.0.0.1:8787/forecast", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      provider,
      apiKey,
      model,
      prompt,
      systemPrompt
    })
  });
  if (!response.ok) {
    let message = "Forecast proxy request failed";
    try {
      const errorData = await response.json();
      if (errorData?.error) message = errorData.error;
    } catch (err) {}
    throw new Error(message);
  }
  const data = await response.json();
  const text = data.text || "";
  return text;
}

async function requestOpenAIForecast(apiKey, model, prompt, systemPrompt) {
  return requestForecastViaProxy("openai", apiKey, model, prompt, systemPrompt);
}

async function requestGeminiForecast(apiKey, model, prompt, systemPrompt) {
  return requestForecastViaProxy("gemini", apiKey, model, prompt, systemPrompt);
}

async function fetchTwelveDataPrice(apiKey) {
  const url = "https://api.twelvedata.com/price?symbol=" + encodeURIComponent("XAU/USD") + "&apikey=" + encodeURIComponent(apiKey) + "&dp=2";
  const response = await fetch(url, { cache: "no-store" });
  if (!response.ok) throw new Error("Twelve Data request failed");
  const data = await response.json();
  const parsed = parseFloat(data.price || 0);
  if (!(parsed > 1000)) throw new Error(data.message || "Invalid XAU/USD price");
  return { price: parsed, source: "Twelve Data" };
}

async function fetchTwelveDataHistory(apiKey, tf) {
  const intervalMap = {
    M1: "1min",
    M5: "5min",
    M15: "15min",
    M30: "30min",
    H1: "1h",
    H4: "4h",
    D1: "1day"
  };
  const interval = intervalMap[tf] || "5min";
  const url = "https://api.twelvedata.com/time_series"
    + "?symbol=XAU/USD"
    + "&interval=" + interval
    + "&outputsize=500"
    + "&apikey=" + encodeURIComponent(apiKey)
    + "&dp=2"
    + "&order=ASC";
  const response = await fetch(url, { cache: "no-store" });
  if (!response.ok) throw new Error("Twelve Data history request failed");
  const data = await response.json();
  if (!data.values || !Array.isArray(data.values)) {
    throw new Error(data.message || "No historical data returned");
  }
  return data.values.map(bar => {
    const raw = bar.datetime;
    const isoUtc = raw.includes("T") ? raw : raw.replace(" ", "T") + "Z";
    const time = new Date(isoUtc).getTime();
    return {
      time,
      open: parseFloat(bar.open),
      high: parseFloat(bar.high),
      low: parseFloat(bar.low),
      close: parseFloat(bar.close)
    };
  }).filter(candle =>
    candle.open > 100 && candle.high > 100 &&
    Number.isFinite(candle.time) && candle.time > 0
  );
}

async function fetchPublicHistory(tf) {
  const intervalMap = {
    M1: "1m",
    M5: "5m",
    M15: "15m",
    M30: "30m",
    H1: "1h",
    H4: "1h",
    D1: "1d"
  };
  const rangeMap = {
    M1: "5d",
    M5: "5d",
    M15: "5d",
    M30: "5d",
    H1: "30d",
    H4: "60d",
    D1: "1y"
  };
  const interval = intervalMap[tf] || "5m";
  const range = rangeMap[tf] || "5d";
  const url = "https://query1.finance.yahoo.com/v8/finance/chart/GC%3DF"
    + "?interval=" + interval
    + "&range=" + range
    + "&includePrePost=false";
  const response = await fetch(url, { cache: "no-store" });
  if (!response.ok) throw new Error("Public history fetch failed");
  const data = await response.json();
  const result = data?.chart?.result?.[0];
  if (!result) throw new Error("No public history data");
  const timestamps = result.timestamp || [];
  const quotes = result.indicators?.quote?.[0] || {};
  return timestamps.map((t, i) => ({
    time: t * 1000,
    open: parseFloat(((quotes.open?.[i]) || 0).toFixed(2)),
    high: parseFloat(((quotes.high?.[i]) || 0).toFixed(2)),
    low: parseFloat(((quotes.low?.[i]) || 0).toFixed(2)),
    close: parseFloat(((quotes.close?.[i]) || 0).toFixed(2))
  })).filter(candle => candle.open > 100 && candle.high > 100 && candle.close > 100);
}

function beep(freq = 880, dur = 1.5, type = "triangle") {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(0.22, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start();
    osc.stop(ctx.currentTime + dur);
  } catch (err) {}
}

function genHistory(base, count = 300) {
  let p = base * (0.994 + Math.random() * 0.004);
  const now = Date.now();
  return Array.from({ length: count }, (_, i) => {
    const open = p;
    const vol = base * 0.001 * (0.45 + Math.random());
    const high = open + vol * (0.4 + Math.random() * 0.8);
    const low = open - vol * (0.4 + Math.random() * 0.8);
    const close = low + (high - low) * Math.random();
    p = close;
    return { time: now - (count - 1 - i) * BASE_CANDLE_MS, open, high, low, close };
  });
}

function aggregateHistory(history, tf) {
  const group = TF_CONFIG[tf]?.group || 1;
  if (group <= 1) return history.slice();
  const out = [];
  for (let i = 0; i < history.length; i += group) {
    const chunk = history.slice(i, i + group);
    if (!chunk.length) continue;
    out.push({
      time: chunk[chunk.length - 1].time,
      open: chunk[0].open,
      high: Math.max(...chunk.map(c => c.high)),
      low: Math.min(...chunk.map(c => c.low)),
      close: chunk[chunk.length - 1].close
    });
  }
  return out;
}

function calcRSI(arr, p = 14) {
  if (arr.length < p + 1) return 50;
  let gains = 0;
  let losses = 0;
  for (let i = arr.length - p; i < arr.length; i++) {
    const delta = arr[i].close - arr[i - 1].close;
    if (delta > 0) gains += delta;
    else losses -= delta;
  }
  const avgGain = gains / p;
  const avgLoss = losses / p;
  if (avgLoss === 0) return 100;
  return +(100 - 100 / (1 + avgGain / avgLoss)).toFixed(2);
}

function calcEMAFromValues(values, p) {
  if (!values.length) return [];
  const k = 2 / (p + 1);
  const ema = [values[0]];
  for (let i = 1; i < values.length; i++) ema.push(values[i] * k + ema[i - 1] * (1 - k));
  return ema;
}

function calcEMA(arr, p) {
  const values = arr.map(x => x.close);
  const series = calcEMAFromValues(values, p);
  return series.length ? series[series.length - 1] : 0;
}

function calcMACD(arr) {
  const closes = arr.map(x => x.close);
  if (closes.length < 35) {
    return {
      macd: 0,
      signal: 0,
      histogram: 0,
      previousMacd: 0,
      previousSignal: 0,
      series: []
    };
  }
  const ema12Series = calcEMAFromValues(closes, 12);
  const ema26Series = calcEMAFromValues(closes, 26);
  const macdSeries = closes.map((_, i) => ema12Series[i] - ema26Series[i]);
  const signalSeries = calcEMAFromValues(macdSeries, 9);
  const histogramSeries = macdSeries.map((value, i) => value - signalSeries[i]);
  const series = arr.map((candle, i) => ({
    time: candle.time,
    macd: macdSeries[i],
    signal: signalSeries[i],
    histogram: histogramSeries[i]
  }));
  const last = series[series.length - 1];
  const previous = series[series.length - 2] || last;
  return {
    macd: last.macd,
    signal: last.signal,
    histogram: last.histogram,
    previousMacd: previous.macd,
    previousSignal: previous.signal,
    series
  };
}

function calcBB(arr, p = 20) {
  if (arr.length < p) {
    const close = arr[arr.length - 1]?.close || 0;
    return { upper: close, middle: close, lower: close };
  }
  const closes = arr.slice(-p).map(x => x.close);
  const middle = closes.reduce((a, b) => a + b, 0) / p;
  const sd = Math.sqrt(closes.reduce((a, b) => a + (b - middle) ** 2, 0) / p);
  return { upper: middle + 2 * sd, middle, lower: middle - 2 * sd };
}

function calcATR(arr, p = 14) {
  if (arr.length < p + 1) return 0;
  const sample = arr.slice(-p - 1);
  const trs = sample.map((x, i, all) => i === 0 ? 0 : Math.max(
    x.high - x.low,
    Math.abs(x.high - all[i - 1].close),
    Math.abs(x.low - all[i - 1].close)
  ));
  return trs.slice(1).reduce((a, b) => a + b, 0) / p;
}

function calcRMA(values, p) {
  if (!values.length) return [];
  const out = [values[0]];
  for (let i = 1; i < values.length; i++) out.push((out[i - 1] * (p - 1) + values[i]) / p);
  return out;
}

function calcDMI(arr, p = 14) {
  if (arr.length < p + 2) {
    return { plusDI: 0, minusDI: 0, adx: 0, dx: 0 };
  }
  const tr = [];
  const plusDM = [];
  const minusDM = [];
  for (let i = 1; i < arr.length; i++) {
    const upMove = arr[i].high - arr[i - 1].high;
    const downMove = arr[i - 1].low - arr[i].low;
    plusDM.push(upMove > downMove && upMove > 0 ? upMove : 0);
    minusDM.push(downMove > upMove && downMove > 0 ? downMove : 0);
    tr.push(Math.max(
      arr[i].high - arr[i].low,
      Math.abs(arr[i].high - arr[i - 1].close),
      Math.abs(arr[i].low - arr[i - 1].close)
    ));
  }
  const trRma = calcRMA(tr, p);
  const plusRma = calcRMA(plusDM, p);
  const minusRma = calcRMA(minusDM, p);
  const dxSeries = trRma.map((trVal, i) => {
    const plus = trVal ? (plusRma[i] / trVal) * 100 : 0;
    const minus = trVal ? (minusRma[i] / trVal) * 100 : 0;
    const denom = plus + minus;
    return denom ? (Math.abs(plus - minus) / denom) * 100 : 0;
  });
  const adxSeries = calcRMA(dxSeries, p);
  const lastIndex = dxSeries.length - 1;
  return {
    plusDI: trRma[lastIndex] ? (plusRma[lastIndex] / trRma[lastIndex]) * 100 : 0,
    minusDI: trRma[lastIndex] ? (minusRma[lastIndex] / trRma[lastIndex]) * 100 : 0,
    dx: dxSeries[lastIndex] || 0,
    adx: adxSeries[adxSeries.length - 1] || 0
  };
}

function calcVWAP(history) {
  const sample = history.slice(-390);
  if (sample.length < 2) return history[history.length - 1]?.close || 0;
  let cumPV = 0;
  let cumVol = 0;
  sample.forEach(c => {
    const typical = (c.high + c.low + c.close) / 3;
    const vol = Math.max(c.high - c.low, 0.01);
    cumPV += typical * vol;
    cumVol += vol;
  });
  return cumVol > 0 ? cumPV / cumVol : sample[sample.length - 1].close;
}

function calcOBV(history) {
  const sample = history.slice(-50);
  if (sample.length < 2) return { obv: 0, trend: "neutral" };
  let obv = 0;
  const obvSeries = [0];
  for (let i = 1; i < sample.length; i++) {
    const vol = Math.max(sample[i].high - sample[i].low, 0.01) * 100;
    if (sample[i].close > sample[i - 1].close) obv += vol;
    else if (sample[i].close < sample[i - 1].close) obv -= vol;
    obvSeries.push(obv);
  }
  const recent5 = obvSeries.slice(-5);
  const obvSlope = recent5[recent5.length - 1] - recent5[0];
  return {
    obv,
    trend: obvSlope > 0 ? "rising" : obvSlope < 0 ? "falling" : "flat"
  };
}

function calcFibLevels(history, lookback = 100) {
  const sample = history.slice(-lookback);
  if (sample.length < 10) return null;
  const swing_high = Math.max(...sample.map(c => c.high));
  const swing_low = Math.min(...sample.map(c => c.low));
  const range = swing_high - swing_low;
  return {
    swing_high,
    swing_low,
    fib236: swing_high - range * 0.236,
    fib382: swing_high - range * 0.382,
    fib500: swing_high - range * 0.500,
    fib618: swing_high - range * 0.618,
    fib786: swing_high - range * 0.786
  };
}

function calcIchimoku(history) {
  if (history.length < 52) return null;
  const hi = arr => Math.max(...arr.map(c => c.high));
  const lo = arr => Math.min(...arr.map(c => c.low));
  const tenkan = (hi(history.slice(-9)) + lo(history.slice(-9))) / 2;
  const kijun = (hi(history.slice(-26)) + lo(history.slice(-26))) / 2;
  const senkouA = (tenkan + kijun) / 2;
  const senkouB = (hi(history.slice(-52)) + lo(history.slice(-52))) / 2;
  const price = history[history.length - 1].close;
  const aboveCloud = price > Math.max(senkouA, senkouB);
  const belowCloud = price < Math.min(senkouA, senkouB);
  const bullishTK = tenkan > kijun;
  return { tenkan, kijun, senkouA, senkouB, aboveCloud, belowCloud, bullishTK };
}

function calcPivotPoints(history) {
  const sample = history.slice(-20);
  if (sample.length < 5) return null;
  const H = Math.max(...sample.map(c => c.high));
  const L = Math.min(...sample.map(c => c.low));
  const C = sample[sample.length - 1].close;
  const P = (H + L + C) / 3;
  return {
    P,
    R1: 2 * P - L,
    R2: P + (H - L),
    R3: H + 2 * (P - L),
    S1: 2 * P - H,
    S2: P - (H - L),
    S3: L - 2 * (H - P)
  };
}

function detectCandlePatterns(history) {
  const patterns = [];
  const len = history.length;
  if (len < 3) return patterns;
  const [c3, c2, c1] = history.slice(-3);
  const body1 = Math.abs(c1.close - c1.open);
  const range1 = c1.high - c1.low;
  const bull1 = c1.close > c1.open;
  const bull2 = c2.close > c2.open;

  if (body1 < range1 * 0.1 && range1 > 0) patterns.push({ name: "Doji", dir: "neutral", strength: "moderate" });
  if (bull1 && (c1.low < c1.open - body1 * 2) && body1 > 0) patterns.push({ name: "Hammer", dir: "buy", strength: "moderate" });
  if ((c1.high > c1.close + body1 * 2) && body1 > 0) patterns.push({ name: "Shooting Star", dir: "sell", strength: "moderate" });
  if (!bull2 && bull1 && c1.open < c2.close && c1.close > c2.open) patterns.push({ name: "Bullish Engulfing", dir: "buy", strength: "strong" });
  if (bull2 && !bull1 && c1.open > c2.close && c1.close < c2.open) patterns.push({ name: "Bearish Engulfing", dir: "sell", strength: "strong" });
  if (c3.close > c3.open && c2.close > c2.open && c1.close > c1.open && c2.close > c3.close && c1.close > c2.close) patterns.push({ name: "Three White Soldiers", dir: "buy", strength: "strong" });
  if (c3.close < c3.open && c2.close < c2.open && c1.close < c1.open && c2.close < c3.close && c1.close < c2.close) patterns.push({ name: "Three Black Crows", dir: "sell", strength: "strong" });
  return patterns;
}

function findPivotLevels(history, left = 2, right = 2, lookback = 80) {
  const sample = history.slice(-lookback);
  const pivots = [];
  for (let i = left; i < sample.length - right; i++) {
    const current = sample[i];
    let pivotHigh = true;
    let pivotLow = true;
    for (let j = i - left; j <= i + right; j++) {
      if (j === i) continue;
      if (sample[j].high >= current.high) pivotHigh = false;
      if (sample[j].low <= current.low) pivotLow = false;
    }
    if (pivotHigh) pivots.push({ type: "high", price: current.high, time: current.time });
    if (pivotLow) pivots.push({ type: "low", price: current.low, time: current.time });
  }
  return pivots;
}

function calcStoch(arr, p = 14) {
  if (arr.length < p) return 50;
  const sample = arr.slice(-p);
  const high = Math.max(...sample.map(x => x.high));
  const low = Math.min(...sample.map(x => x.low));
  if (high === low) return 50;
  return +(((arr[arr.length - 1].close - low) / (high - low)) * 100).toFixed(2);
}

function getIndicators(history, price) {
  if (history.length < 55) return null;
  const vwap = calcVWAP(history);
  const obv = calcOBV(history);
  const fib = calcFibLevels(history);
  const ichimoku = calcIchimoku(history);
  const pivots = calcPivotPoints(history);
  const patterns = detectCandlePatterns(history);
  return {
    rsi: calcRSI(history),
    macd: calcMACD(history),
    bb: calcBB(history),
    atr: calcATR(history),
    dmi: calcDMI(history),
    stoch: calcStoch(history),
    ema21: calcEMA(history.slice(-21), 21),
    ema50: calcEMA(history.slice(-50), 50),
    ema200: calcEMA(history.slice(-200), 200),
    vwap,
    obv,
    fib,
    ichimoku,
    pivots,
    patterns,
    price
  };
}

function clamp(val, min, max) {
  return Math.max(min, Math.min(max, val));
}

function getSignal(ind, price) {
  if (!ind) return { signal: "WAIT", buyScore: 0, sellScore: 0, confidence: 50, reasons: [], bias: "Neutral", setup: "No data" };
  const { rsi, macd, bb, stoch, ema21, ema50, atr, dmi } = ind;
  let buyScore = 0;
  let sellScore = 0;
  const reasons = [];

  const trendUp = price > ema21 && ema21 > ema50;
  const trendDown = price < ema21 && ema21 < ema50;
  const trendMixed = !trendUp && !trendDown;
  const adxStrong = dmi.adx >= 20;
  const adxWeak = dmi.adx < 16;
  const bullishDMI = dmi.plusDI > dmi.minusDI;
  const bearishDMI = dmi.minusDI > dmi.plusDI;
  const priceAboveBothEMAs = price > ema21 && price > ema50;
  const priceBelowBothEMAs = price < ema21 && price < ema50;

  if (trendUp && priceAboveBothEMAs) {
    buyScore += 3;
    reasons.push({ dir: "buy", text: "Price above EMA21 and EMA50 - bullish trend stack" });
  } else if (trendDown && priceBelowBothEMAs) {
    sellScore += 3;
    reasons.push({ dir: "sell", text: "Price below EMA21 and EMA50 - bearish trend stack" });
  } else {
    reasons.push({ dir: "neutral", text: "Trend structure is mixed - conviction is lower" });
  }

  const hardBuyVeto = priceBelowBothEMAs;
  const hardSellVeto = priceAboveBothEMAs;

  if (adxStrong && bullishDMI) { buyScore += 3; reasons.push({ dir: "buy", text: "ADX trend strength supports buyers (+DI > -DI)" }); }
  else if (adxStrong && bearishDMI) { sellScore += 3; reasons.push({ dir: "sell", text: "ADX trend strength supports sellers (-DI > +DI)" }); }
  else if (adxWeak) { reasons.push({ dir: "neutral", text: "ADX is weak, so breakout quality is limited" }); }

  const macdAboveSignal = macd.macd > macd.signal;
  const macdBelowSignal = macd.macd < macd.signal;
  const bullishCross = macd.previousMacd <= macd.previousSignal && macd.macd > macd.signal;
  const bearishCross = macd.previousMacd >= macd.previousSignal && macd.macd < macd.signal;
  const macdLevel = macd.macd;
  const macdStronglyNegative = macdLevel < -3.0;
  const macdStronglyPositive = macdLevel > 3.0;

  if (bullishCross && !macdStronglyNegative) {
    buyScore += 3;
    reasons.push({ dir: "buy", text: "MACD bullish crossover (12,26,9)" });
  } else if (bearishCross && !macdStronglyPositive) {
    sellScore += 3;
    reasons.push({ dir: "sell", text: "MACD bearish crossover (12,26,9)" });
  } else if (macdAboveSignal && !macdStronglyNegative) {
    buyScore += 2;
    reasons.push({ dir: "buy", text: "MACD above signal line" });
  } else if (macdBelowSignal || macdStronglyNegative) {
    sellScore += 2;
    reasons.push({ dir: "sell", text: "MACD below signal line" });
  }

  if (macdStronglyNegative) {
    sellScore += 2;
    reasons.push({ dir: "sell", text: "MACD value deeply negative - strong downward momentum" });
  }
  if (macdStronglyPositive) {
    buyScore += 2;
    reasons.push({ dir: "buy", text: "MACD value strongly positive - strong upward momentum" });
  }

  if (macd.histogram > 0 && macd.histogram > (macd.series[macd.series.length - 2]?.histogram ?? macd.histogram)) {
    buyScore += 1;
    reasons.push({ dir: "buy", text: "MACD histogram expanding upward" });
  } else if (macd.histogram < 0 && macd.histogram < (macd.series[macd.series.length - 2]?.histogram ?? macd.histogram)) {
    sellScore += 1;
    reasons.push({ dir: "sell", text: "MACD histogram expanding downward" });
  }

  if (trendUp && rsi >= 52 && rsi <= 68) { buyScore += 2; reasons.push({ dir: "buy", text: "RSI supports bullish continuation (" + rsi.toFixed(0) + ")" }); }
  else if (trendDown && rsi >= 32 && rsi <= 48) { sellScore += 2; reasons.push({ dir: "sell", text: "RSI supports bearish continuation (" + rsi.toFixed(0) + ")" }); }
  else if (rsi < 28 && !trendDown) { buyScore += 1; reasons.push({ dir: "buy", text: "RSI is stretched lower and may mean-revert" }); }
  else if (rsi > 72 && !trendUp) { sellScore += 1; reasons.push({ dir: "sell", text: "RSI is stretched higher and may mean-revert" }); }

  if (stoch > 85) {
    sellScore += 3;
    reasons.push({ dir: "sell", text: "Stochastic extremely overbought (" + stoch.toFixed(0) + ") - reversal risk high" });
  } else if (stoch < 15) {
    buyScore += 3;
    reasons.push({ dir: "buy", text: "Stochastic extremely oversold (" + stoch.toFixed(0) + ") - reversal opportunity" });
  } else if (trendUp && stoch > 45 && stoch < 80) {
    buyScore += 1;
    reasons.push({ dir: "buy", text: "Stochastic in bullish continuation zone (" + stoch.toFixed(0) + ")" });
  } else if (trendDown && stoch < 55 && stoch > 20) {
    sellScore += 1;
    reasons.push({ dir: "sell", text: "Stochastic in bearish continuation zone (" + stoch.toFixed(0) + ")" });
  }

  const bbRange = Math.max(bb.upper - bb.lower, 0.0001);
  const bbPos = (price - bb.lower) / bbRange;
  if (trendUp && bbPos > 0.55 && bbPos < 0.92) { buyScore += 1; reasons.push({ dir: "buy", text: "Price is holding the upper Bollinger half" }); }
  else if (trendDown && bbPos < 0.45 && bbPos > 0.08) { sellScore += 1; reasons.push({ dir: "sell", text: "Price is holding the lower Bollinger half" }); }

  if (ind.vwap) {
    if (price > ind.vwap && trendUp) {
      buyScore += 2;
      reasons.push({ dir: "buy", text: "Price trading above VWAP - institutional buy pressure" });
    } else if (price < ind.vwap && trendDown) {
      sellScore += 2;
      reasons.push({ dir: "sell", text: "Price trading below VWAP - institutional sell pressure" });
    }
  }

  if (ind.obv) {
    if (ind.obv.trend === "rising" && trendUp) {
      buyScore += 1;
      reasons.push({ dir: "buy", text: "OBV rising - volume confirms bullish move" });
    } else if (ind.obv.trend === "falling" && trendDown) {
      sellScore += 1;
      reasons.push({ dir: "sell", text: "OBV falling - volume confirms bearish move" });
    } else if ((ind.obv.trend === "falling" && trendUp) || (ind.obv.trend === "rising" && trendDown)) {
      reasons.push({ dir: "neutral", text: "OBV diverging from price - reduced conviction" });
      buyScore = Math.max(0, buyScore - 1);
      sellScore = Math.max(0, sellScore - 1);
    }
  }

  if (ind.ichimoku) {
    const { aboveCloud, belowCloud, bullishTK } = ind.ichimoku;
    if (aboveCloud && bullishTK) {
      buyScore += 2;
      reasons.push({ dir: "buy", text: "Ichimoku: price above cloud with bullish TK cross" });
    } else if (belowCloud && !bullishTK) {
      sellScore += 2;
      reasons.push({ dir: "sell", text: "Ichimoku: price below cloud with bearish TK alignment" });
    }
  }

  if (ind.ema200) {
    if (price > ind.ema200) {
      buyScore += 1;
      reasons.push({ dir: "buy", text: "Price above EMA200 - long-term uptrend intact" });
    } else {
      sellScore += 1;
      reasons.push({ dir: "sell", text: "Price below EMA200 - long-term downtrend pressure" });
    }
  }

  if (ind.patterns && ind.patterns.length > 0) {
    ind.patterns.forEach(p => {
      if (p.dir === "buy") {
        const pts = p.strength === "strong" ? 2 : 1;
        buyScore += pts;
        reasons.push({ dir: "buy", text: "Pattern: " + p.name + " detected (" + p.strength + " signal)" });
      } else if (p.dir === "sell") {
        const pts = p.strength === "strong" ? 2 : 1;
        sellScore += pts;
        reasons.push({ dir: "sell", text: "Pattern: " + p.name + " detected (" + p.strength + " signal)" });
      } else {
        reasons.push({ dir: "neutral", text: "Pattern: " + p.name + " - indecision candle, wait for confirmation" });
      }
    });
  }

  if (ind.fib) {
    const fib = ind.fib;
    const nearFib = level => Math.abs(price - level) < ind.atr * 0.5;
    if (nearFib(fib.fib618) && trendUp) {
      buyScore += 2;
      reasons.push({ dir: "buy", text: "Price at 61.8% Fibonacci support - key reversal zone" });
    } else if (nearFib(fib.fib382) && trendDown) {
      sellScore += 2;
      reasons.push({ dir: "sell", text: "Price at 38.2% Fibonacci resistance - pullback rejection zone" });
    } else if (nearFib(fib.fib500)) {
      reasons.push({ dir: "neutral", text: "Price at 50% Fibonacci mid-level - wait for directional break" });
    }
  }

  if (atr > 0 && atr / price > 0.005) reasons.push({ dir: "neutral", text: "Volatility elevated, widen stops" });

  const total = buyScore + sellScore;
  const dominance = total > 0 ? Math.max(buyScore, sellScore) / total : 0.5;
  const confidence = Math.round(clamp(
    dominance * 70 + Math.min(dmi.adx, 40) * 0.55 + (total > 12 ? 5 : 0),
    30, 97
  ));
  let signal = "WAIT";
  if (buyScore >= 8 && buyScore - sellScore >= 3 && dmi.adx >= 18) signal = "BUY";
  if (sellScore >= 8 && sellScore - buyScore >= 3 && dmi.adx >= 18) signal = "SELL";
  if (dmi.adx < 14) signal = "WAIT";
  if (Math.abs(rsi - 50) < 5 && signal !== "WAIT") signal = "WAIT";

  if (hardBuyVeto && signal === "BUY") {
    signal = "WAIT";
    reasons.push({ dir: "neutral", text: "BUY vetoed - price is below both EMA21 and EMA50" });
  }
  if (hardSellVeto && signal === "SELL") {
    signal = "WAIT";
    reasons.push({ dir: "neutral", text: "SELL vetoed - price is above both EMA21 and EMA50" });
  }
  if (confidence < 65 && signal !== "WAIT") signal = "WAIT";

  return {
    signal,
    buyScore,
    sellScore,
    confidence,
    reasons,
    bias: buyScore > sellScore ? "Bullish" : sellScore > buyScore ? "Bearish" : "Neutral",
    setup: adxStrong ? "Trend" : adxWeak ? "Range" : "Transition"
  };
}

function getLevels(history, price, ind, analysis) {
  const atr = ind?.atr || price * 0.005;
  const recent = history.slice(-40);
  const support = recent.length ? Math.min(...recent.map(c => c.low)) : price - atr;
  const resistance = recent.length ? Math.max(...recent.map(c => c.high)) : price + atr;
  const pivots = findPivotLevels(history, 2, 2, 80);
  const pivotLow = [...pivots].reverse().find(p => p.type === "low" && p.price < price)?.price ?? support;
  const pivotHigh = [...pivots].reverse().find(p => p.type === "high" && p.price > price)?.price ?? resistance;
  const isBuy = analysis.signal === "BUY";
  const isSell = analysis.signal === "SELL";
  const structureTarget = isBuy ? pivotHigh : isSell ? pivotLow : price;
  const minStopDistance = Math.max(atr * 1.8, 20);
  const fallbackStop = isBuy
    ? price - minStopDistance
    : isSell
      ? price + minStopDistance
      : price;
  const stop = isBuy
    ? Math.min(fallbackStop, pivotLow - atr * 0.5)
    : isSell
      ? Math.max(fallbackStop, pivotHigh + atr * 0.5)
      : price;
  const risk = Math.max(Math.abs(price - stop), atr * 1.5, 20);
  const tp1 = isBuy
    ? Math.max(pivotHigh, price + risk * 1.8)
    : isSell
      ? Math.min(pivotLow, price - risk * 1.8)
      : price;
  const tp2 = isBuy
    ? price + risk * 3.2
    : isSell
      ? price - risk * 3.2
      : price;
  const rr = risk > 0 ? Math.abs(tp1 - price) / risk : 0;
  const planReasons = [];
  if (analysis.signal !== "WAIT" && rr < 1.5) planReasons.push("Nearest target does not offer enough reward relative to stop distance.");
  if (ind?.dmi?.adx < 16 && analysis.signal !== "WAIT") planReasons.push("Trend strength is weak, so breakouts are less reliable.");
  const tradable = analysis.signal !== "WAIT" && rr >= 1.5 && (ind?.dmi?.adx ?? 0) >= 14;
  return {
    atr,
    support,
    resistance,
    pivotLow,
    pivotHigh,
    stop,
    tp1,
    tp2,
    rr,
    tradable,
    planReasons,
    signal: tradable ? analysis.signal : "WAIT",
    confidence: tradable ? analysis.confidence : Math.min(analysis.confidence, 45)
  };
}

function getMarketState(history, price, ind, analysis, tf) {
  const closes = history.slice(-12).map(c => c.close);
  const momentum = closes.length > 1 ? ((closes[closes.length - 1] - closes[0]) / closes[0]) * 100 : 0;
  const atrPct = ind?.atr ? (ind.atr / price) * 100 : 0;
  const trend = ind ? (price > ind.ema21 && ind.ema21 > ind.ema50 ? "Uptrend" : price < ind.ema21 && ind.ema21 < ind.ema50 ? "Downtrend" : "Range") : "Range";
  const vol = atrPct > 0.6 ? "High" : atrPct > 0.35 ? "Medium" : "Low";
  const quality = analysis.confidence >= 72 && analysis.signal !== "WAIT" ? "A-grade" : analysis.confidence >= 60 ? "B-grade" : "C-grade";
  return { tf, trend, volatility: vol, momentum, quality, atrPct };
}

const MTF_CACHE = { M5: null, M15: null, H1: null, lastUpdate: 0 };

function getMultiTimeframeConfluence(history, price) {
  const tfGroups = { M5: 5, M15: 15, H1: 60 };
  const results = {};

  Object.entries(tfGroups).forEach(([tfLabel]) => {
    const aggregated = aggregateHistory(history, tfLabel);
    if (aggregated.length < 55) {
      results[tfLabel] = "WAIT";
      return;
    }
    const ind = getIndicators(aggregated, aggregated[aggregated.length - 1].close);
    const sig = getSignal(ind, aggregated[aggregated.length - 1].close);
    results[tfLabel] = sig.signal;
  });

  const votes = Object.values(results);
  const buyVotes = votes.filter(v => v === "BUY").length;
  const sellVotes = votes.filter(v => v === "SELL").length;

  let confluence = "NONE";
  let confluenceScore = 0;
  if (buyVotes === 3) { confluence = "STRONG_BUY"; confluenceScore = 100; }
  else if (buyVotes === 2) { confluence = "BUY"; confluenceScore = 67; }
  else if (sellVotes === 3) { confluence = "STRONG_SELL"; confluenceScore = 100; }
  else if (sellVotes === 2) { confluence = "SELL"; confluenceScore = 67; }
  else { confluence = "MIXED"; confluenceScore = 0; }

  return {
    M5: results.M5 || "WAIT",
    M15: results.M15 || "WAIT",
    H1: results.H1 || "WAIT",
    confluence,
    confluenceScore,
    aligned: confluenceScore >= 67
  };
}

function buildPrediction(history, ind, levels, marketState, tf, session) {
  if (session.isClosed) {
    return {
      generatedAt: Date.now(),
      horizon: "5m",
      signal: "WAIT",
      confidence: 0,
      entry: history[history.length - 1]?.close || 0,
      stop: history[history.length - 1]?.close || 0,
      tp1: history[history.length - 1]?.close || 0,
      tp2: history[history.length - 1]?.close || 0,
      tp3: history[history.length - 1]?.close || 0,
      forecast5: history[history.length - 1]?.close || 0,
      forecast10: history[history.length - 1]?.close || 0,
      reasons: ["Market is closed, so prediction is paused until the next session opens."],
      risks: [],
      tradeQuality: "SKIP",
      rrRatio: 0,
      marketBias: "Neutral",
      newsRisk: "Low",
      path: []
    };
  }
  if (!ind || history.length < 30) return null;
  const last = history[history.length - 1];
  const previous = history[history.length - 2] || last;
  const closes = history.slice(-10).map(c => c.close);
  const momentum5 = closes.length >= 5 ? closes[closes.length - 1] - closes[closes.length - 5] : 0;
  const momentum10 = closes.length >= 10 ? closes[closes.length - 1] - closes[0] : 0;
  const bodyBias = history.slice(-6).reduce((sum, candle) => sum + Math.sign(candle.close - candle.open), 0) / 6;
  const atr = Math.max(ind.atr || last.close * 0.002, 0.01);
  const macdDelta = ind.macd.macd - ind.macd.signal;
  const histSlope = ind.macd.histogram - (ind.macd.series[ind.macd.series.length - 2]?.histogram || 0);
  const trendBias = (last.close > ind.ema21 ? 0.8 : -0.8) + (ind.ema21 > ind.ema50 ? 1 : -1);
  const rsiBias = (ind.rsi - 50) / 18;
  const momentumBias = (momentum5 / atr) * 0.9 + (momentum10 / atr) * 0.45;
  const breakoutBias = last.close > levels.resistance - atr * 0.18 ? 1.2 : last.close < levels.support + atr * 0.18 ? -1.2 : 0;
  const macdBias = (macdDelta / Math.max(Math.abs(ind.macd.signal), 0.2)) * 1.7 + (histSlope / Math.max(atr * 0.08, 0.01)) * 0.35;
  const score = trendBias + rsiBias + momentumBias + breakoutBias + macdBias + bodyBias;
  const absScore = Math.abs(score);
  const direction = score > 1.35 ? 1 : score < -1.35 ? -1 : 0;
  let signal = direction > 0 ? "BUY" : direction < 0 ? "SELL" : "WAIT";
  const confidence = direction === 0 ? Math.min(58, Math.round(42 + absScore * 7)) : Math.max(55, Math.min(93, Math.round(56 + absScore * 8)));
  const impulse5 = atr * (0.35 + Math.min(absScore, 4) * 0.1);
  const impulse10 = atr * (0.58 + Math.min(absScore, 4) * 0.14);
  const forecast5 = last.close + direction * impulse5;
  const forecast10 = last.close + direction * impulse10;
  const stop = direction >= 0
    ? last.close - Math.max(atr * 1.5, atr * 1.2)
    : last.close + Math.max(atr * 1.5, atr * 1.2);
  const tp1 = direction >= 0 ? forecast5 : forecast5;
  const tp2 = direction >= 0 ? forecast10 : forecast10;
  const tp3 = direction >= 0 ? last.close + direction * atr * 2.9 : last.close + direction * atr * 2.9;
  const reasons = [];
  reasons.push("MACD " + (macdDelta >= 0 ? "leans bullish" : "leans bearish") + " with histogram " + (histSlope >= 0 ? "improving" : "weakening") + ".");
  reasons.push("Short-term momentum over the last 5 to 10 bars is " + (momentum10 >= 0 ? "positive" : "negative") + ".");
  reasons.push("Trend structure is " + marketState.trend.toLowerCase() + " and volatility is " + marketState.volatility.toLowerCase() + ".");
  reasons.push(direction === 0 ? "Setup lacks enough edge for a strong directional trade right now." : "Projection favors a " + signal + " continuation over the next 5 to 10 minutes.");
  reasons.push("Macro news and US data are not yet connected to this local forecast engine, so this projection is based on live chart structure and indicators only.");
  if (!levels.tradable) {
    signal = "WAIT";
    reasons.unshift("Trade quality is reduced because structure or reward-to-risk is not strong enough.");
  }
  const futureStepMs = 60000;
  const path = direction === 0 ? [] : Array.from({ length: 5 }, (_, i) => {
    const step = i + 1;
    const ratio = step / 5;
    const curved = last.close + direction * impulse5 * (ratio * (0.82 + ratio * 0.18));
    return { time: last.time + futureStepMs * step, price: curved };
  });
  return {
    generatedAt: Date.now(),
    horizon: "5m",
    signal,
    confidence,
    entry: last.close,
    stop,
    tp1,
    tp2,
    tp3,
    forecast5,
    forecast10,
    reasons,
    risks: [],
    tradeQuality: signal === "WAIT" ? "SKIP" : confidence >= 80 ? "A" : confidence >= 70 ? "B" : "C",
    rrRatio: levels.rr || 0,
    marketBias: direction > 0 ? "Bullish" : direction < 0 ? "Bearish" : "Neutral",
    newsRisk: "Low",
    path
  };
}

function Candles({ data, width = 560, height = 130, levels, tf, forecastPath }) {
  const pad = { top: 8, right: 58, bottom: 22, left: 10 };
  const futurePoints = forecastPath?.length || 0;
  const forecastZone = futurePoints ? 90 : 0;
  const plotWidth = width - pad.left - pad.right - forecastZone;
  const plotHeight = height - pad.top - pad.bottom;
  const lo = Math.min(...data.map(c => c.low), ...(forecastPath || []).map(p => p.price), levels?.support ?? Infinity, levels?.stop ?? Infinity, levels?.tp1 ?? Infinity);
  const hi = Math.max(...data.map(c => c.high), ...(forecastPath || []).map(p => p.price), levels?.resistance ?? -Infinity, levels?.tp1 ?? -Infinity, levels?.tp2 ?? -Infinity);
  const range = hi - lo || 1;
  const toY = v => pad.top + plotHeight * (1 - (v - lo) / range);
  const totalSlots = data.length;
  const candleSlotWidth = plotWidth / totalSlots;
  const cw = Math.max(2, Math.floor(candleSlotWidth * 0.75));
  const candleGap = Math.max(1, candleSlotWidth - cw);
  const lines = [];
  if (levels) {
    [["Support", levels.support, "#34d39922"], ["Resistance", levels.resistance, "#f8717122"], ["Stop", levels.stop, "#f8717140"], ["TP1", levels.tp1, "#34d39940"]].forEach(([label, val, color]) => {
      lines.push(h("line", { key: label, x1: pad.left, y1: toY(val), x2: width - pad.right - forecastZone, y2: toY(val), stroke: color, strokeWidth: 1, strokeDasharray: "4,4" }));
    });
  }
  const mainStep = Math.max(1, Math.floor((data.length - 1) / 4));
  return h("svg", { viewBox: "0 0 " + width + " " + height, style: { width: "100%", display: "block" }, preserveAspectRatio: "none" },
    [0, 0.25, 0.5, 0.75, 1].map((f, i) => {
      const y = pad.top + plotHeight * f;
      const value = hi - range * f;
      return h("g", { key: "grid-" + i },
        h("line", { x1: pad.left, y1: y, x2: width - pad.right, y2: y, stroke: "#1e293b", strokeWidth: 0.5, strokeDasharray: "3,4" }),
        h("text", { x: width - 4, y: y + 3, fill: "#64748b", fontSize: 9, textAnchor: "end" }, formatPrice(value))
      );
    }),
    Array.from({ length: 5 }, (_, i) => {
      const index = Math.min(data.length - 1, i * mainStep);
      const x = pad.left + index * candleSlotWidth + candleSlotWidth / 2;
      return h("g", { key: "x-" + i },
        h("line", { x1: x, y1: pad.top, x2: x, y2: height - pad.bottom, stroke: "#10192b", strokeWidth: 0.4, strokeDasharray: "2,5" }),
        h("text", { x, y: height - 5, fill: "#64748b", fontSize: 9, textAnchor: "middle" }, formatAxisTime(data[index].time, tf))
      );
    }),
    futurePoints > 0 && forecastPath.map((point, i) => {
      const x = pad.left + plotWidth + ((i + 1) * forecastZone) / futurePoints;
      return h("g", { key: "fx-" + i },
        h("line", { x1: x, y1: pad.top, x2: x, y2: height - pad.bottom, stroke: "#142235", strokeWidth: 0.5, strokeDasharray: "2,4" }),
        h("text", { x, y: height - 5, fill: "#60a5fa", fontSize: 9, textAnchor: "middle" }, formatAxisTime(point.time, tf))
      );
    }),
    lines,
    data.map((c, i) => {
      const bull = c.close >= c.open;
      const x = pad.left + i * candleSlotWidth + candleSlotWidth / 2 - cw / 2;
      const bodyTop = toY(Math.max(c.open, c.close));
      const bodyBottom = toY(Math.min(c.open, c.close));
      const color = bull ? "#34d399" : "#f87171";
      return h("g", { key: i },
        h("line", { x1: x + cw / 2, y1: toY(c.high), x2: x + cw / 2, y2: toY(c.low), stroke: color, strokeWidth: 0.8 }),
        h("rect", { x, y: bodyTop, width: cw, height: Math.max(bodyBottom - bodyTop, 1), fill: color, rx: 0.5, opacity: i === data.length - 1 ? 1 : 0.96 }),
        i === data.length - 1 && h("rect", { x: x - 1, y: bodyTop - 1, width: cw + 2, height: Math.max(bodyBottom - bodyTop, 1) + 2, fill: "none", stroke: color, strokeWidth: 1.2, opacity: 0.75 })
      );
    }),
    futurePoints > 0 && h("path", {
      d: ([["M", pad.left + (data.length - 1) * candleSlotWidth + candleSlotWidth / 2, toY(data[data.length - 1].close)]]
        .concat(forecastPath.map((point, i) => ["L", pad.left + plotWidth + ((i + 1) * forecastZone) / futurePoints, toY(point.price)]))
        .map(segment => segment[0] + segment[1] + " " + segment[2]).join(" ")),
      fill: "none",
      stroke: forecastPath[forecastPath.length - 1].price >= data[data.length - 1].close ? "#60a5fa" : "#f59e0b",
      strokeWidth: 2,
      strokeDasharray: "5,4",
      strokeLinecap: "round",
      strokeLinejoin: "round"
    }),
    futurePoints > 0 && forecastPath.map((point, i) => {
      const x = pad.left + plotWidth + ((i + 1) * forecastZone) / futurePoints;
      const y = toY(point.price);
      const color = forecastPath[forecastPath.length - 1].price >= data[data.length - 1].close ? "#60a5fa" : "#f59e0b";
      return h("circle", { key: "fp-" + i, cx: x, cy: y, r: 2.3, fill: color });
    })
  );
}

function MACDChart({ series, width = 560, height = 150, tf }) {
  if (!series || !series.length) return null;
  const pad = { top: 10, right: 58, bottom: 22, left: 10 };
  const plotWidth = width - pad.left - pad.right;
  const plotHeight = height - pad.top - pad.bottom;
  const values = series.flatMap(point => [point.macd, point.signal, point.histogram, 0]);
  const min = Math.min(...values);
  const max = Math.max(...values);
  const range = max - min || 1;
  const zeroY = pad.top + plotHeight * (1 - (0 - min) / range);
  const toY = value => pad.top + plotHeight * (1 - (value - min) / range);
  const slotWidth = plotWidth / series.length;
  const step = slotWidth;
  const barWidth = Math.max(2, slotWidth * 0.6);
  const xStep = Math.max(1, Math.floor((series.length - 1) / 4));
  const buildPath = key => series.map((point, index) => (index === 0 ? "M" : "L") + (padX + index * slotWidth + slotWidth / 2) + " " + toY(point[key])).join(" ");
  const padX = pad.left;
  return h("svg", { viewBox: "0 0 " + width + " " + height, style: { width: "100%", display: "block" }, preserveAspectRatio: "none" },
    [0, 0.25, 0.5, 0.75, 1].map((f, i) => {
      const y = pad.top + plotHeight * f;
      const value = max - range * f;
      return h("g", { key: "grid-" + i },
        h("line", { x1: pad.left, y1: y, x2: width - pad.right, y2: y, stroke: "#121a2d", strokeWidth: 0.5, strokeDasharray: "3,5" }),
        h("text", { x: width - 4, y: y + 3, fill: "#64748b", fontSize: 9, textAnchor: "end" }, value.toFixed(3))
      );
    }),
    Array.from({ length: 5 }, (_, i) => {
      const index = Math.min(series.length - 1, i * xStep);
      const x = pad.left + index * slotWidth + slotWidth / 2;
      return h("g", { key: "x-" + i },
        h("line", { x1: x, y1: pad.top, x2: x, y2: height - pad.bottom, stroke: "#10192b", strokeWidth: 0.4, strokeDasharray: "2,5" }),
        h("text", { x, y: height - 5, fill: "#64748b", fontSize: 9, textAnchor: "middle" }, formatAxisTime(series[index].time, tf))
      );
    }),
    h("line", { x1: pad.left, y1: zeroY, x2: width - pad.right, y2: zeroY, stroke: "#344054", strokeWidth: 0.8 }),
    series.map((point, index) => {
      const x = padX + index * slotWidth + slotWidth / 2;
      const y = toY(point.histogram);
      const top = Math.min(y, zeroY);
      const barHeight = Math.max(Math.abs(zeroY - y), 1);
      const color = point.histogram >= 0 ? "#d0d5dd99" : "#6b728099";
      return h("rect", { key: "bar-" + index, x: x - barWidth / 2, y: top, width: barWidth, height: barHeight, fill: color, rx: 0.6, opacity: index === series.length - 1 ? 1 : 0.9 });
    }),
    h("path", { d: buildPath("macd"), fill: "none", stroke: "#d1d5db", strokeWidth: 1.35, strokeLinecap: "round", strokeLinejoin: "round" }),
    h("path", { d: buildPath("signal"), fill: "none", stroke: "#7f1d1d", strokeWidth: 1.6, strokeLinecap: "round", strokeLinejoin: "round", strokeDasharray: "1.5,3" }),
    h("text", { x: 8, y: 13, fill: "#94a3b8", fontSize: 10 }, "MACD (12, 26, 9)"),
    h("text", { x: width - 6, y: 13, fill: "#cbd5e1", fontSize: 10, textAnchor: "end" }, series[series.length - 1].macd.toFixed(3) + " " + series[series.length - 1].signal.toFixed(3)),
    h("text", { x: width - 6, y: zeroY - 4, fill: "#475569", fontSize: 9, textAnchor: "end" }, "0.000")
  );
}

function ChartCaption({ text, width = 560, height = 36, tone = "#f59e0b" }) {

    }

function Bar({ label, val, min = 0, max = 100, color = "#60a5fa", fmt }) {
  const pct = Math.min(100, Math.max(0, ((val - min) / (max - min || 1)) * 100));
  return h("div", { style: { marginBottom: 9 } },
    h("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 10, color: "#94a3b8", marginBottom: 2 } },
      h("span", null, label),
      h("span", { style: { color: "#e2e8f0", fontWeight: 700 } }, fmt ? fmt(val) : val.toFixed(1))
    ),
    h("div", { style: { height: 4, background: "#1a2540", borderRadius: 2, overflow: "hidden" } },
      h("div", { style: { width: pct + "%", height: "100%", background: color, borderRadius: 2, transition: "width 0.6s ease" } })
    )
  );
}
